<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Certificados - CEAN Capacitación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="responsive.css" />
    <style>
        .icon { width: 20px; height: 20px; fill: currentColor; vertical-align: middle; }
        .icon-lg { width: 24px; height: 24px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 700px; width: 100%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); text-align: center; }
        .logo { width: 100px; height: 100px; margin-bottom: 15px; }
        h1 { color: #1a1a2e; font-size: 22px; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        .search-box input:focus { outline: none; border-color: #d4af37; }
        .search-box button { padding: 15px 25px; background: #d4af37; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .search-box button:hover { background: #b8941f; }
        .search-box button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 25px; padding: 25px; border-radius: 15px; display: none; animation: slideIn 0.5s ease; }
        .result.success { background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%); color: white; display: block; }
        .result.error { background: #ffe6e6; color: #cc0000; display: block; }
        .result.loading { background: #f0f0f0; color: #666; display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .verified-badge { font-size: 50px; margin-bottom: 15px; }
        .check-verified { width: 50px; height: 50px; color: #4ade80; animation: checkBounce 0.6s ease, checkPulse 2s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(255, 255, 255, 1)) drop-shadow(0 0 40px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 60px rgba(74, 222, 128, 0.3)); }
        @keyframes checkBounce { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 50% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes checkPulse { 0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 1)) drop-shadow(0 0 40px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 60px rgba(74, 222, 128, 0.3)); transform: scale(1); } 50% { filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) drop-shadow(0 0 60px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 80px rgba(74, 222, 128, 0.5)); transform: scale(1.05); } }
        .certificate-info { text-align: left; margin-top: 20px; }
        .certificate-info h3 { font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.3); font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: bold; opacity: 0.9; }
        .info-value { opacity: 0.95; }
        .scan-hint { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 10px; color: #666; font-size: 13px; }
        .scan-hint strong { color: #d4af37; }
        @media print { body * { visibility: hidden; } .qr-container, .qr-container * { visibility: visible; } .qr-container { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-cean.png" alt="CEAN" class="logo" style="width: 140px; height: 140px; object-fit: contain;" />
        <h1>CEAN Capacitación</h1>
        <p class="subtitle">Verificación de Certificados</p>
        <div class="search-box">
            <input type="text" id="codigoInput" placeholder="Ingresa el código del certificado" />
            <button onclick="verificarCertificado()" id="btnVerificar">Verificar</button>
        </div>
        <div id="resultado" class="result"></div>
        <div class="scan-hint">
            <strong>📱 ¿Escaneaste un QR?</strong><br>
            El código se cargará automáticamente. Si no es así, ingrésalo manualmente arriba.
        </div>
    </div>
    <script>
        const API_KEY = 'AIzaSyAOhGTjJXHhuUhqf1g2DPCla59xNzftb-Q';
        const SPREADSHEET_ID = '1zB0M4mq956OrfWzGj7Bo73QeM4bp8QNRRk1tagD78Xw';
        const RANGE_READ = 'Certificados!A:E';
        const VERIFY_URL = 'https://gleoleder.github.io/QR_CERTIFICADO_CEAN/';

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const codigo = urlParams.get('codigo') || urlParams.get('code') || urlParams.get('cert');
            if (codigo) {
                document.getElementById('codigoInput').value = codigo;
                await verificarCertificado();
            }
        };

        async function verificarCertificado() {
            const codigo = document.getElementById('codigoInput').value.trim();
            const resultado = document.getElementById('resultado');
            const btn = document.getElementById('btnVerificar');

            if (!codigo) {
                resultado.className = 'result error';
                resultado.innerHTML = '<div class="verified-badge">❌</div><p>Ingresa un código de certificado</p>';
                return;
            }

            resultado.className = 'result loading';
            resultado.innerHTML = '<div class="verified-badge">⏳</div><p>Verificando...</p>';
            btn.disabled = true;

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE_READ}?key=${API_KEY}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Error de conexión');
                const data = await response.json();
                const rows = data.values || [];
                const certificado = rows.find(row => row[0] && row[0].toString().trim() === codigo);

                if (certificado && certificado.length > 0) {
                    const nombre = certificado[1] || 'N/A';
                    const curso = certificado[2] || 'N/A';
                    const fecha = certificado[3] || 'N/A';
                    const estado = certificado[4] || 'Activo';

                    resultado.className = 'result success';
                    resultado.innerHTML = `
                        <div class="verified-badge">
                            <svg class="check-verified" viewBox="0 0 24 24" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 2c-.791 0-1.55.314-2.11.874l-.893.893a.985.985 0 0 1-.696.288H7.04A2.984 2.984 0 0 0 4.055 7.04v1.262a.986.986 0 0 1-.288.696l-.893.893a2.984 2.984 0 0 0 0 4.22l.893.893a.985.985 0 0 1 .288.696v1.262a2.984 2.984 0 0 0 2.984 2.984h1.262c.261 0 .512.104.696.288l.893.893a2.984 2.984 0 0 0 4.22 0l.893-.893a.985.985 0 0 1 .696-.288h1.262a2.984 2.984 0 0 0 2.984-2.984V15.7c0-.261.104-.512.288-.696l.893-.893a2.984 2.984 0 0 0 0-4.22l-.893-.893a.985.985 0 0 1-.288-.696V7.04a2.984 2.984 0 0 0-2.984-2.984h-1.262a.985.985 0 0 1-.696-.288l-.893-.893A2.984 2.984 0 0 0 12 2Zm3.683 7.73a1 1 0 1 0-1.414-1.413l-4.253 4.253-1.277-1.277a1 1 0 0 0-1.415 1.414l1.985 1.984a1 1 0 0 0 1.414 0l4.96-4.96Z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <h3 style="color: white; margin-bottom: 5px;">¡Certificado Verificado!</h3>
                        <p style="color: rgba(255,255,255,0.9); font-size: 14px; margin-bottom: 20px;">Este es un certificado oficial emitido por el <strong>Instituto CEAN Capacitación</strong></p>
                        <div style="background: rgba(255,255,255,0.2); border-radius: 12px; padding: 20px; margin-top: 15px;">
                            <p style="color: white; font-size: 13px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">
                                <svg class="icon" style="margin-right: 6px; vertical-align: middle;" viewBox="0 0 24 24">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" fill="none"/>
                                    <path d="M14 2v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                El dueño del certificado es:
                            </p>
                            <h2 style="color: white; font-size: 24px; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">
                                <svg class="icon-lg" style="margin-right: 8px; vertical-align: middle;" viewBox="0 0 24 24">
                                    <circle cx="12" cy="8" r="4" fill="currentColor"/>
                                    <path d="M12 14c-6 0-8 3-8 6v2h16v-2c0-6-2-6-8-6z" fill="currentColor"/>
                                </svg>
                                ${nombre}
                            </h2>
                            <div style="text-align: left; background: rgba(255,255,255,0.15); border-radius: 10px; padding: 15px;">
                                <div class="info-row" style="border-color: rgba(255,255,255,0.3);">
                                    <span class="info-label" style="color: rgba(255,255,255,0.9);">Curso:</span>
                                    <span class="info-value" style="color: white;">${curso}</span>
                                </div>
                                <div class="info-row" style="border-color: rgba(255,255,255,0.3);">
                                    <span class="info-label" style="color: rgba(255,255,255,0.9);">Fecha de Emisión:</span>
                                    <span class="info-value" style="color: white;">${fecha}</span>
                                </div>
                                <div class="info-row" style="border-color: rgba(255,255,255,0.3);">
                                    <span class="info-label" style="color: rgba(255,255,255,0.9);">Código:</span>
                                    <span class="info-value" style="color: white;">${codigo}</span>
                                </div>
                                <div class="info-row" style="border-color: rgba(255,255,255,0.3);">
                                    <span class="info-label" style="color: rgba(255,255,255,0.9);">Estado:</span>
                                    <span class="info-value" style="color: white;">${estado}</span>
                                </div>
                            </div>
                        </div>
                        <p style="color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 15px;">Instituto CEAN Capacitación - Autenticidad Verificada</p>
                    `;
                } else {
                    resultado.className = 'result error';
                    resultado.innerHTML = `<div class="verified-badge">❌</div><h3>No Encontrado</h3><p>El código <strong>${codigo}</strong> no está registrado.</p>`;
                }
            } catch (error) {
                resultado.className = 'result error';
                resultado.innerHTML = `<div class="verified-badge">⚠️</div><h3>Error</h3><p>${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('codigoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verificarCertificado();
        });
    </script>
</body>
</html>
